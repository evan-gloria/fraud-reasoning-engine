version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
      - GCP_REGION=${GCP_REGION}
      - GCP_FIRESTORE_DATABASE=${GCP_FIRESTORE_DATABASE}
      - GCP_ARTIFACT_BUCKET=${GCP_ARTIFACT_BUCKET}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      # Shared static assets for charts and decks
      - ./ui/static:/app/ui/static
      # Mount GCP Application Default Credentials
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8080
    depends_on:
      - backend
    volumes:
      # Shared static assets so UI can render charts/decks immediately
      - ./ui/static:/app/ui/static
